<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Photo Capture & Email</title>
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@2.6.4/dist/email.min.js"></script>
</head>
<body>
  <h2>Click to Take Photo and Send to Email</h2>
  <button onclick="takePhoto()">Take Photo</button>
  <div id="photo-container"></div>

  <script>
    // Initialize EmailJS
    emailjs.init("tgzwl-rBt8y9zaBCO"); // Replace with your EmailJS user ID

    let video = document.createElement('video');
    let canvas = document.createElement('canvas');
    let context = canvas.getContext('2d');

    // Start webcam
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        video.srcObject = stream;
        video.play();
      })
      .catch(err => {
        alert("Error accessing camera: " + err);
      });

    function takePhoto() {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      context.drawImage(video, 0, 0, canvas.width, canvas.height);

      // Convert canvas to image data
      let imageData = canvas.toDataURL('image/png');

      // Send photo via EmailJS
      emailjs.send("service_c0zxyca", "template_u0i7lsq", {
        to_email: "akramkakooza256@gmail.com", // Change this to the email you want
        attachment: imageData
      })
      .then(function(response) {
        alert("Photo sent to email successfully!");
      }, function(error) {
        alert("Error sending photo: " + error);
      });
    }
  </script>
</body>
</html>
